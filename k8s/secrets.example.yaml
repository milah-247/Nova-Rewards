# DO NOT commit real secrets.
# Use Sealed Secrets or External Secrets Operator in production.
# Generate base64 values: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: nova-rewards-secrets
  namespace: nova-rewards
type: Opaque
data:
  DATABASE_URL: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  STELLAR_SECRET_KEY: <base64-encoded-value>
