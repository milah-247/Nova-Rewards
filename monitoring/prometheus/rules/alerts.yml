groups:
  - name: nova_rewards_alerts
    interval: 30s
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[5m])) 
            / 
            sum(rate(http_request_duration_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "High 5xx error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/high-error-rate.md"

      # High Latency Alert
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 1
        for: 10m
        labels:
          severity: warning
          component: backend
        annotations:
          summary: "High API latency detected on {{ $labels.route }}"
          description: "95th percentile latency is {{ $value }}s (threshold: 1s)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/high-latency.md"

      # Service Down Alert
      - alert: ServiceDown
        expr: up{job="nova-backend"} == 0
        for: 2m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Nova Rewards backend is down"
          description: "Backend service has been down for more than 2 minutes"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/service-down.md"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}% (threshold: 80%)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/high-cpu.md"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanize }}% (threshold: 85%)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/high-memory.md"

      # Database Connection Issues
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been unreachable for 2 minutes"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/postgres-down.md"

      # High Database Connections
      - alert: HighDatabaseConnections
        expr: |
          (pg_stat_database_numbackends / pg_settings_max_connections) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connection usage"
          description: "Database connections at {{ $value | humanize }}% of max (threshold: 80%)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/high-db-connections.md"

      # Redis Down
      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been unreachable for 2 minutes"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/redis-down.md"

      # High Redis Memory Usage
      - alert: HighRedisMemory
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is {{ $value | humanize }}% (threshold: 90%)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/high-redis-memory.md"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Only {{ $value | humanize }}% disk space remaining (threshold: 15%)"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/low-disk-space.md"

      # SSL Certificate Expiry
      - alert: SSLCertificateExpiringSoon
        expr: |
          probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ $value | humanizeDuration }}"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/ssl-expiry.md"

      # Endpoint Health Check Failure
      - alert: EndpointDown
        expr: probe_success == 0
        for: 5m
        labels:
          severity: critical
          component: backend
        annotations:
          summary: "Endpoint {{ $labels.instance }} is down"
          description: "Health check has been failing for 5 minutes"
          runbook: "https://github.com/nova-rewards/runbooks/blob/main/endpoint-down.md"
