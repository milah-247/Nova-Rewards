# docker-compose.prod.yml — Production environment
# Usage: docker compose -f docker-compose.prod.yml up --build
# Requires: novaRewards/.env.prod
# NOTE: Never run with --build in production without a tested image tag.

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_rewards}
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
      - ./backups/wal:/var/lib/postgresql/wal-archive
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60s
      - -c
      - max_wal_senders=5
      - -c
      - archive_command=/usr/local/bin/archive-wal.sh %p %f
      - -c
      - log_statement=ddl
      - -c
      - log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova} -d ${POSTGRES_DB:-nova_rewards}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "/migrations/migrate.js"]
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_MIGRATE_URL:?DATABASE_MIGRATE_URL is required for production migrations}
      NODE_ENV: production
    volumes:
      - ./database:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 640M

  pg-backup:
    image: postgres:16-alpine
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nova_rewards}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:?BACKUP_S3_BUCKET is required}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
    volumes:
      - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        apk add --no-cache aws-cli &&
        chmod +x /usr/local/bin/pg-backup.sh &&
        echo '0 */6 * * * /usr/local/bin/pg-backup.sh >> /var/log/pg-backup.log 2>&1' | crontab - &&
        /usr/local/bin/pg-backup.sh &&
        crond -f -l 8
      "
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nova_rewards}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_MODE: single
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?ALLOWED_ORIGIN is required}
      # Connection pool — sized for production load
      DB_POOL_MIN: 5
      DB_POOL_MAX: 50
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  gateway:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ../deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  pg_backups:
