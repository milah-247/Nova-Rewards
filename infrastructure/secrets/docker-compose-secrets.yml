version: '3.8'

services:
  vault:
    image: vault:1.15.0
    container_name: vault
    environment:
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_API_ADDR: "http://0.0.0.0:8200"
      VAULT_CONFIG_DIR: "/vault/config"
    ports:
      - "8200:8200"
    volumes:
      - ./vault-config.hcl:/vault/config/vault.hcl
      - vault-data:/vault/data
      - vault-logs:/vault/logs
      - ./certs:/vault/config/certs
    cap_add:
      - IPC_LOCK
    command: server -config=/vault/config/vault.hcl
    networks:
      - secrets
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - vault-init

  vault-init:
    image: vault:1.15.0
    container_name: vault-init
    environment:
      VAULT_ADDR: "http://vault:8200"
    volumes:
      - ./init.sh:/init.sh
      - vault-keys:/vault/keys
    command: /bin/bash /init.sh
    networks:
      - secrets
    profiles:
      - setup
    depends_on:
      vault:
        condition: service_started

  aws-secrets-manager-mock:
    image: localstack/localstack:latest
    container_name: localstack
    environment:
      SERVICES: secretsmanager
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - "${TMPDIR:-/tmp/localstack}:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - secrets
    profiles:
      - with-aws

  secret-rotator:
    image: secret-rotator:latest
    container_name: secret-rotator
    build:
      context: ./secret-rotator
      dockerfile: Dockerfile
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "${VAULT_TOKEN}"
      ROTATION_INTERVAL: "86400"  # 24 hours
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    volumes:
      - ./secret-rotator:/app
    networks:
      - secrets
    depends_on:
      - vault
    restart: unless-stopped

volumes:
  vault-data:
  vault-logs:
  vault-keys:

networks:
  secrets:
    driver: bridge
