# Production overrides — pass with: helm upgrade ... -f values-production.yaml
config:
  apiUrl: https://api.nova-rewards.io

backend:
  replicaCount: 3
  image:
    pullPolicy: Always
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    minReplicas: 3
    maxReplicas: 20

frontend:
  replicaCount: 3
  image:
    pullPolicy: Always
  autoscaling:
    minReplicas: 3
    maxReplicas: 15
