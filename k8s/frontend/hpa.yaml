apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nova-rewards-frontend
  namespace: nova-rewards
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nova-rewards-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
