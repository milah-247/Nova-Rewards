services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nova_rewards}
      POSTGRES_USER: ${POSTGRES_USER:-nova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
      - ./backups/wal:/var/lib/postgresql/wal-archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nova} -d ${POSTGRES_DB:-nova_rewards}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=60s
      - -c
      - max_wal_senders=3
      - -c
      - archive_command=/usr/local/bin/archive-wal.sh %p %f

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  stellar:
    image: stellar/quickstart:testing
    command: --local --enable-stellar-rpc
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/rpc -d '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"getHealth\"}' -H 'Content-Type: application/json' | grep -q '\"status\":\"healthy\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Runs pending migrations once on every `docker compose up`
  migrate:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --prefix /app/database 2>/dev/null; node database/migrate.js"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nova_rewards}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Scheduled PostgreSQL backups (runs every 6 hours via crond)
  pg-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nova_rewards}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./scripts/pg-backup.sh:/usr/local/bin/pg-backup.sh:ro
      - pg_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        apk add --no-cache aws-cli &&
        chmod +x /usr/local/bin/pg-backup.sh &&
        echo '0 */6 * * * /usr/local/bin/pg-backup.sh >> /var/log/pg-backup.log 2>&1' | crontab - &&
        /usr/local/bin/pg-backup.sh &&
        crond -f -l 8
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-nova}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nova_rewards}
      REDIS_URL: redis://redis:6379
      REDIS_MODE: single
      ALLOWED_ORIGIN: http://localhost:3000
      HORIZON_URL: http://stellar:8000
      STELLAR_RPC_URL: http://stellar:8000/rpc
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_HORIZON_URL: http://localhost:8000
      NEXT_PUBLIC_STELLAR_NETWORK: local
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  pg_backups:
  backend_node_modules:
  frontend_node_modules:
