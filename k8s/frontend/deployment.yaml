apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-rewards-frontend
  namespace: nova-rewards
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nova-rewards-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nova-rewards-frontend
    spec:
      containers:
        - name: frontend
          image: nova-rewards-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nova-rewards-config
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            failureThreshold: 12
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
