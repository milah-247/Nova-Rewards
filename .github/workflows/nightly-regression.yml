name: Nightly Regression Tests

on:
  schedule:
    # Runs every night at 02:00 UTC against staging
    - cron: '0 2 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    environment: staging

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_test
      NODE_ENV: test
      ISSUER_PUBLIC: ${{ secrets.ISSUER_PUBLIC }}
      HORIZON_URL: ${{ secrets.STAGING_HORIZON_URL }}
      STELLAR_NETWORK: testnet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novaRewards/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: novaRewards

      - name: Run regression test suite
        id: regression
        run: |
          npx jest --testPathPattern="regression.test.js" \
            --runInBand --ci \
            --json --outputFile=test-results/regression.json \
            --reporters=default --reporters=jest-junit
        working-directory: novaRewards/backend
        continue-on-error: true

      - name: Upload regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-results-${{ github.run_id }}
          path: |
            novaRewards/backend/test-results/
            novaRewards/backend/coverage/

      - name: Notify Slack on failure
        if: steps.regression.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚨 *Nightly Regression Tests FAILED* on `${{ github.repository }}`\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Results>\n*Branch:* `${{ github.ref_name }}`\n*Time:* ${{ github.event.head_commit.timestamp }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_REGRESSION_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send email alert on failure
        if: steps.regression.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          subject: '🚨 Nova Rewards — Nightly Regression Tests FAILED'
          to: ${{ secrets.ENGINEERING_EMAIL_LIST }}
          from: Nova Rewards CI <${{ secrets.ALERT_EMAIL_USER }}>
          body: |
            The nightly regression test suite has FAILED.

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Run ID:     ${{ github.run_id }}

            View full results:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please investigate and fix before the next release.

      - name: Fail job if regression tests failed
        if: steps.regression.outcome == 'failure'
        run: exit 1
