<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Rewards</title>
  <style>
    /* Reset and base styles */
    body, table, td, p, a, li, blockquote {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      -ms-interpolation-mode: bicubic;
    }

    /* Responsive container */
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
    }

    /* Header */
    .header {
      background-color: #1a365d;
      padding: 20px;
      text-align: center;
    }

    .header img {
      max-width: 150px;
      height: auto;
    }

    /* Content */
    .content {
      padding: 30px 20px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #333333;
    }

    /* Buttons */
    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #3182ce;
      color: #ffffff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      margin: 10px 0;
    }

    .button:hover {
      background-color: #2c5282;
    }

    /* Footer */
    .footer {
      background-color: #f7fafc;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #718096;
    }

    /* Responsive */
    @media only screen and (max-width: 600px) {
      .email-container {
        width: 100% !important;
      }
      .content {
        padding: 20px 10px !important;
      }
      .button {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }
    }

    /* Accessibility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f7fafc;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
    <tr>
      <td align="center" style="padding: 20px 0;">
        <table class="email-container" role="presentation" width="600" cellspacing="0" cellpadding="0" border="0">
          <!-- Header -->
          <tr>
            <td class="header">
              <img src="https://novarewards.com/logo.png" alt="Nova Rewards" />
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td class="content">
              {{content}}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td class="footer">
              <p>
                Nova Rewards<br>
                <a href="https://novarewards.com">Visit our website</a> |
                <a href="https://novarewards.com/privacy">Privacy Policy</a> |
                <a href="https://novarewards.com/terms">Terms of Service</a>
              </p>
              <p>
                You received this email because you signed up for Nova Rewards.<br>
                <a href="{{unsubscribe_link}}">Unsubscribe</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
